<body>
  <header>
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <span class="logo-icon" aria-hidden="true">🚨</span>
          <h1>Četník</h1>
        </div>
        <button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Přepnout tmavý režim"
          title="Přepnout tmavý/světlý režim">
          <span class="theme-icon" id="themeIcon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <div class="container">
    <!-- Input Section -->
    <div class="input-section">
      <div class="input-wrapper">
        <label for="inputText">Zadejte text k analýze:</label>
        <div class="textarea-wrapper" id="textareaWrapper">
          <textarea id="inputText"
            placeholder="Napište nebo vložte text, který chcete analyzovat... nebo přetáhněte textový soubor"
            oninput="handleInput()" aria-describedby="charCounter"></textarea>
          <span id="charCounter" class="char-counter" aria-live="polite">0 znaků</span>
        </div>
        <div class="discount-toggle-row">
          <button type="button" class="discount-toggle" onclick="toggleDiscount()" id="discountToggle">
            <span class="discount-icon">➖</span>
            <span class="discount-text">Odečíst znaky z výsledků</span>
            <span class="case-info">odečíst</span>
            <span class="discount-arrow">▼</span>
          </button>

          <label class="switch-label">
            <div class="switch">
              <input type="checkbox" id="caseSensitiveToggle" onchange="toggleCaseSensitive()">
              <span class="slider"></span>
            </div>
            <span class="toggle-text" id="caseSensitiveText">Rozlišovat velikost (a/A)</span>
          </label>
        </div>
        <div class="button-row">
          <button type="button" class="btn-secondary icon-button" onclick="clearText()" id="clearBtn" disabled
            aria-label="Vymazat text">
            <span>✕</span>
            <span>Vymazat</span>
          </button>
          <button type="button" class="btn-secondary icon-button" onclick="document.getElementById('fileInput').click()"
            aria-label="Nahrát soubor">
            <span>📁</span>
            <span>Nahrát soubor</span>
          </button>
          <input type="file" id="fileInput" accept=".txt,.text" style="display: none;"
            onchange="handleFileUpload(event)" aria-label="Vybrat textový soubor">
        </div>
      </div>
    </div>

    <!-- Discount Section -->
    <div class="discount-section" id="discountSection" style="display: none;">
      <div class="input-wrapper">
        <label for="discountText">Odečíst znaky z výsledků:</label>
        <div class="textarea-wrapper">
          <textarea id="discountText"
            placeholder="Zadejte znaky, které chcete odečíst (např.: aaabb → odečte 3× a, 2× b)."
            oninput="handleDiscountInput()" rows="2"></textarea>
          <span id="discountCounter" class="char-counter">0 znaků</span>
        </div>
        <div class="discount-example">
          Příklady: "á" odečte 1× A i 1× ´, "F" odečte 1× F (malé i velké), "FfÁ" = odečte 2× F a 1× A i 1× ´
        </div>
        <div class="button-row">
          <button type="button" class="btn-secondary icon-button" onclick="clearDiscount()" id="clearDiscountBtn"
            disabled>
            <span>✕</span>
            <span>Vymazat</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar" style="display: none;">
      <div class="stat">
        <div class="stat-icon" aria-hidden="true">🔤</div>
        <div class="stat-value" id="totalChars">0</div>
        <div class="stat-label">Celkem<br>znaků</div>
      </div>
      <div class="stat">
        <div class="stat-icon" aria-hidden="true">✏️</div>
        <div class="stat-value" id="totalLetters">0</div>
        <div class="stat-label">Písmen</div>
      </div>
      <div class="stat">
        <div class="stat-icon" aria-hidden="true">´</div>
        <div class="stat-value" id="totalDiacritics">0</div>
        <div class="stat-label">Diakritiky</div>
      </div>
      <div class="stat">
        <div class="stat-icon" aria-hidden="true">🔣</div>
        <div class="stat-value" id="totalSymbols">0</div>
        <div class="stat-label">Symbolů</div>
      </div>
      <div class="stat">
        <div class="stat-icon" aria-hidden="true">🔢</div>
        <div class="stat-value" id="totalNumbers">0</div>
        <div class="stat-label">Číslic</div>
      </div>
    </div>

    <!-- Results Section -->
    <div class="results-section">
      <div class="results-header">
        <h2 class="results-title">📊 Výsledky</h2>
        <div class="view-toggle" role="tablist" aria-label="Filtr zobrazení">
          <button type="button" class="view-btn active" onclick="setView('all')" id="viewAll" role="tab"
            aria-selected="true" aria-label="Zobrazit vše">
            🎯 Vše
          </button>
          <button type="button" class="view-btn" onclick="setView('letters')" id="viewLetters" role="tab"
            aria-selected="false" aria-label="Zobrazit pouze písmena">
            🔤 Písmena
          </button>
          <button type="button" class="view-btn" onclick="setView('diacritics')" id="viewDiacritics" role="tab"
            aria-selected="false" aria-label="Zobrazit pouze diakritiku">
            ´ Diakritika
          </button>
          <button type="button" class="view-btn" onclick="setView('symbols')" id="viewSymbols" role="tab"
            aria-selected="false" aria-label="Zobrazit pouze symboly">
            🔣 Symboly
          </button>
          <button type="button" class="view-btn" onclick="setView('numbers')" id="viewNumbers" role="tab"
            aria-selected="false" aria-label="Zobrazit pouze čísla">
            🔢 Čísla
          </button>
        </div>
      </div>

      <div id="results" role="region" aria-live="polite">
        <div class="empty-state">
          <span class="empty-state-icon" aria-hidden="true">📝</span>
          <p>Začněte psaním textu výše</p>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-content">
        <p>🚨 Četník - Počítadlo písmen</p>
      </div>
    </div>
  </footer>
